
name: Playwright Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run login setup (storageState creation)
      - name: Run login setup
        run: npx playwright test tests/setup/loginSetup.spec.ts --reporter=list
        continue-on-error: true

      # Verify storageState was created
      - name: Verify storageState exists
        run: |
          if [ -f storageState.json ]; then
            echo "✅ storageState.json created successfully"
            cat storageState.json
          else
            echo "⚠️ storageState.json not found, tests will run without auth"
          fi

      # Run all tests
      - name: Run Playwright tests
        run: npm test

      - name: Upload test results (video, traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/